name: Canary

# Run weekly against upcoming CPython versions to catch breakage early.
# Failures here are warnings, not blockers — hence continue-on-error.
on:
  schedule:
    - cron: "0 3 1 * *"   # first day of every month at 03:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  canary:
    name: Python ${{ matrix.python-version }} (pre-release)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.15-dev"]   # bump this as new alphas appear

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install
        run: pip install -e ".[test]"

      - name: Test
        run: pytest tests/
